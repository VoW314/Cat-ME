      xmlns:h="jakarta.faces.html"

<ui:composition>


    <p:dialog id="CatEditDialog" header="Edit Cat" widgetVar="CatEditDialog" modal="true" resizable="false">
        <h:form id="CatEditForm">
            <p:panelGrid columns="2" columnClasses="label,value" cellpadding="5">

                <h:outputText value="Name:" />
                <p:inputText value="#{catController.selected.name}" required="true" label="Name" />

                <h:outputText value="Origin:" />
                <p:inputText value="#{catController.selected.origin}" />

                <h:outputText value="Temperament:" />
                <p:inputTextarea value="#{catController.selected.temperament}" rows="3" cols="30" />

                <h:outputText value="Description:" />
                <p:inputTextarea value="#{catController.selected.description}" rows="3" cols="30" />

                <h:outputText value="Life Span:" />
                <p:inputText value="#{catController.selected.lifeSpan}" />

                <h:outputText value="Weight (lbs):" />
                <p:inputText value="#{catController.selected.weight}" />

                <h:outputText value="Random Photo URL:" />
                <p:inputText value="#{catController.selected.randomPhotoUrl}" />

                <h:outputText value="Vetstreet URL:" />
                <p:inputText value="#{catController.selected.vetstreetUrl}" />

            </p:panelGrid>

            <p:separator />

            <p:commandButton value="Save" icon="fas fa-save" styleClass="rounded-button"
                             actionListener="#{catController.update()}"
                             update=":CatTableForm,:growlInfoMessage"
                             oncomplete="PF('CatEditDialog').hide()"/>
            &nbsp;
            <p:commandButton value="Cancel" type="button" icon="fas fa-times" styleClass="rounded-button"
                             onclick="PF('CatEditDialog').hide()" />

        </h:form>
    </p:dialog>
</ui:composition>
</html>
