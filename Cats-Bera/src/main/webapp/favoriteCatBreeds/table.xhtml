<ui:composition template="/template/siteTemplate.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:p="primefaces"
                xmlns:ui="jakarta.faces.facelets">

    <ui:define name="editableContent">
        <h:outputText value="Number of cats: #{catController.listOfCats.size()}"/>

        <h:form id="CatTableForm">


            <h1 align="center">Favorite Cat Breeds</h1>

            <p:dataTable value="#{catController.listOfCats}" var="cat">

                <p:column headerText="ID">
                    <h:outputText value="#{cat.catId}" />
                </p:column>

                <p:column headerText="Name">
                    <h:outputText value="#{cat.name}" />
                </p:column>

                <p:column headerText="Origin">
                    <h:outputText value="#{cat.origin}" />
                </p:column>

                <p:column headerText="Temperament">
                    <h:outputText value="#{cat.temperament}" />
                </p:column>

                <p:column headerText="Life Span">
                    <h:outputText value="#{cat.lifeSpan}" />
                </p:column>

                <p:column headerText="Weight">
                    <h:outputText value="#{cat.weight}" />
                </p:column>

            </p:dataTable>

        </h:form>

    </ui:define>
</ui:composition>
