<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:c="jakarta.tags.core">

<ui:composition>

    <p:dialog id="CatViewDialog" header="View Cat Breed"
              widgetVar="CatViewDialog"
              modal="true" position="center" appendTo="@(body)"
              width="50%" height="400"
              showEffect="slide" hideEffect="fade" responsive="true">

        <h:form id="CatViewForm" class="ui-datatable-data">

            <div align="center">

                <!-- Top Image -->
                <h:graphicImage value="#{catController.selected.randomPhotoUrl}"
                                class="scalableImage"/>
                <br/><br/>

                <h:panelGroup id="display">

                    <table border="1" align="center" cellpadding="5" cellspacing="0">
                        <tbody>

                        <!-- Cat ID -->
                        <tr>
                            <td align="right" bgcolor="papayawhip">
                                <h:outputText value="Cat ID:"/>
                            </td>
                            <td bgcolor="oldlace">
                                <h:outputText value="#{catController.selected.catId}"/>
                            </td>
                        </tr>

                        <!-- Name -->
                        <tr>
                            <td align="right" bgcolor="papayawhip">
                                <h:outputText value="Name:"/>
                            </td>
                            <td bgcolor="oldlace">
                                <h:outputText value="#{catController.selected.name}"/>
                            </td>
                        </tr>

                        <!-- Origin -->
                        <tr>
                            <td align="right" bgcolor="papayawhip">
                                <h:outputText value="Origin:"/>
                            </td>
                            <td bgcolor="oldlace">
                                <h:outputText value="#{catController.selected.origin}"/>
                            </td>
                        </tr>

                        <!-- Temperament -->
                        <tr>
                            <td align="right" bgcolor="papayawhip">
                                <h:outputText value="Temperament:"/>
                            </td>
                            <td bgcolor="oldlace">
                                <h:outputText value="#{catController.selected.temperament}"/>
                            </td>
                        </tr>

                        <!-- Description -->
                        <tr>
                            <td align="right" bgcolor="papayawhip">
                                <h:outputText value="Description:"/>
                            </td>
                            <td bgcolor="oldlace">
                                <h:outputText value="#{catController.selected.description}"/>
                            </td>
                        </tr>

                        <!-- Life Span -->
                        <tr>
                            <td align="right" bgcolor="papayawhip">
                                <h:outputText value="Life Span:"/>
                            </td>
                            <td bgcolor="oldlace">
                                <h:outputText value="#{catController.selected.lifeSpan}"/>
                            </td>
                        </tr>

                        <!-- Weight -->
                        <tr>
                            <td align="right" bgcolor="papayawhip">
                                <h:outputText value="Weight (lbs):"/>
                            </td>
                            <td bgcolor="oldlace">
                                <h:outputText value="#{catController.selected.weight}"/>
                            </td>
                        </tr>

                        <!-- Vetstreet -->
                        <tr>
                            <td align="right" bgcolor="papayawhip">
                                <h:outputText value="Vetstreet Webpage:"/>
                            </td>
                            <td bgcolor="oldlace">
                                <c:if test="#{catController.selected.vetstreetUrl == ''}">
                                    <h:outputText value="N/A"/>
                                </c:if>
                                <c:if test="#{catController.selected.vetstreetUrl != ''}">
                                    <a href="#{catController.selected.vetstreetUrl}" target="_blank">
                                        <img src="#{resource['images:wwwIcon.png']}" width="30" alt=""/>
                                    </a>
                                </c:if>
                            </td>
                        </tr>

                        </tbody>
                    </table>

                </h:panelGroup>

            </div>

            <br/><br/>

            <!-- CLOSE BUTTON -->
            <h:panelGroup>
                <div align="center">
                    <p:commandButton value="Close"
                                     icon="fas fa-window-close"
                                     styleClass="ui-button-outlined"
                                     onclick="PF('CatViewDialog').hide()"/>
                </div>
            </h:panelGroup>

        </h:form>
    </p:dialog>

</ui:composition>


</html>
