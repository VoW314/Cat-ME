      xmlns:h="jakarta.faces.html"

<ui:composition>
    <p:dialog id="CatViewDialog" header="View Cat Details" widgetVar="CatViewDialog" modal="true" resizable="false">
        <h:form id="CatViewForm">
            <p:panelGrid columns="2" columnClasses="label,value" cellpadding="5">

                <h:outputText value="Name:" />
                <h:outputText value="#{catController.selected.name}" />

                <h:outputText value="Origin:" />
                <h:outputText value="#{catController.selected.origin}" />

                <h:outputText value="Temperament:" />
                <h:outputText value="#{catController.selected.temperament}" />

                <h:outputText value="Description:" />
                <h:outputText value="#{catController.selected.description}" />

                <h:outputText value="Life Span:" />
                <h:outputText value="#{catController.selected.lifeSpan}" />

                <h:outputText value="Weight (lbs):" />
                <h:outputText value="#{catController.selected.weight}" />

                <h:outputText value="Random Photo:" />
                <h:graphicImage value="#{catController.selected.randomPhotoUrl}" width="100"/>

                <h:outputText value="Vetstreet Webpage:" />
                <c:choose>
                    <c:when test="#{catController.selected.vetstreetUrl eq ''}">
                        <h:outputText value="N/A" />
                    </c:when>
                    <c:otherwise>
                        <a href="#{catController.selected.vetstreetUrl}" target="_blank">
                            <h:graphicImage name="images/wwwIcon.png" width="30" alt="Vetstreet Website"/>
                        </a>
                    </c:otherwise>
                </c:choose>

            </p:panelGrid>

            <p:separator />

            <p:commandButton value="Close" type="button" icon="fas fa-times" styleClass="rounded-button"
                             onclick="PF('CatViewDialog').hide()" />

        </h:form>
    </p:dialog>
</ui:composition>
</html>
