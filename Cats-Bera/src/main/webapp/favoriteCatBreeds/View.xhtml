<ui:composition>

    <!-- Dialog to view cat details -->
    <p:dialog id="CatViewDialog" header="View Cat Details" widgetVar="CatViewDialog"
              modal="true" resizable="false" appendTo="@(body)" width="50%" responsive="true">

        <h:form id="CatViewForm" class="ui-datatable-data">
            <table border="0" align="center" cellpadding="5" cellspacing="0">
                <tbody>
                <tr>
                    <td align="right" valign="middle" bgcolor="papayawhip">
                        <h:outputText value="Name:" />
                    </td>
                    <td align="left" valign="middle" bgcolor="oldlace">
                        <h:outputText value="#{catController.selected.name}" />
                    </td>
                </tr>

                <tr>
                    <td align="right" valign="middle" bgcolor="papayawhip">
                        <h:outputText value="Origin:" />
                    </td>
                    <td align="left" valign="middle" bgcolor="oldlace">
                        <h:outputText value="#{catController.selected.origin}" />
                    </td>
                </tr>

                <tr>
                    <td align="right" valign="middle" bgcolor="papayawhip">
                        <h:outputText value="Temperament:" />
                    </td>
                    <td align="left" valign="middle" bgcolor="oldlace">
                        <h:outputText value="#{catController.selected.temperament}" />
                    </td>
                </tr>

                <tr>
                    <td align="right" valign="middle" bgcolor="papayawhip">
                        <h:outputText value="Description:" />
                    </td>
                    <td align="left" valign="middle" bgcolor="oldlace">
                        <h:outputText value="#{catController.selected.description}" />
                    </td>
                </tr>

                <tr>
                    <td align="right" valign="middle" bgcolor="papayawhip">
                        <h:outputText value="Life Span:" />
                    </td>
                    <td align="left" valign="middle" bgcolor="oldlace">
                        <h:outputText value="#{catController.selected.lifeSpan}" />
                    </td>
                </tr>

                <tr>
                    <td align="right" valign="middle" bgcolor="papayawhip">
                        <h:outputText value="Weight (lbs):" />
                    </td>
                    <td align="left" valign="middle" bgcolor="oldlace">
                        <h:outputText value="#{catController.selected.weight}" />
                    </td>
                </tr>

                <tr>
                    <td align="right" valign="middle" bgcolor="papayawhip">
                        <h:outputText value="Random Photo:" />
                    </td>
                    <td align="left" valign="middle" bgcolor="oldlace">
                        <h:graphicImage value="#{catController.selected.randomPhotoUrl}" width="150px" />
                    </td>
                </tr>

                <!-- Vetstreet URL Conditional Handling -->
                <tr>
                    <td align="right" valign="middle" nowrap="nowrap" bgcolor="papayawhip">
                        <h:outputText value="Vetstreet Webpage:" />
                    </td>
                    <td align="left" valign="middle" bgcolor="oldlace">
                        <c:if test="#{catController.selected.vetstreetUrl == ''}">
                            <h:outputText value="N/A" />
                        </c:if>
                        <c:if test="#{catController.selected.vetstreetUrl != ''}">
                            <a href="#{catController.selected.vetstreetUrl}" target="_blank">
                                <img src="#{resource['images:wwwIcon.png']}" alt="Vetstreet Website" width="30"/>
                            </a>
                        </c:if>
                    </td>
                </tr>

                </tbody>
            </table>
        </h:form>

    </p:dialog>

</ui:composition>
</html>
