<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

<ui:composition template="/template/siteTemplate.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:h="jakarta.faces.html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="jakarta.faces.core">

    <!--
      - Created by Osman Balci. Adapted by Shreyas Bera
      - Copyright © 2026 Osman Balci. All rights reserved
    -->
    <ui:define name="editableContent">
        <h:form id="CatBreedPhotoForm">

            <!-- Center Everything -->
            <div style="display:flex; flex-direction:column; align-items:center;">

                <h1>Random Cat Breed Photo</h1>

                <!-- Dropdown -->
                <div style="margin-bottom:20px;">
                    <p:selectOneMenu value="#{catApiController.selectedBreedId}" style="width:300px">

                        <f:selectItem itemLabel="Select a Cat Breed"
                                      itemValue=""
                                      noSelectionOption="true"/>

                        <f:selectItems value="#{catApiController.breedOptions}" />

                    </p:selectOneMenu>
                </div>

                <!-- Image -->
                <h:panelGroup rendered="#{not empty catApiController.catBreedPhotoUrl}">
                    <h:graphicImage value="#{catApiController.catBreedPhotoUrl}"
                                    width="50%"
                                    style="border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.2);" />
                </h:panelGroup>

                <br/><br/>

                <!-- Button -->
                <p:commandButton value="Show Cat Breed Photo"
                                 icon="fas fa-image"
                                 styleClass="rounded-button"
                                 update="CatBreedPhotoForm"
                                 action="#{catApiController.getRandomCatBreedPhoto()}"/>


            </div>

        </h:form>

    </ui:define>

</ui:composition>
