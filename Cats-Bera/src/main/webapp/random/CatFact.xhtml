<ui:composition template="/template/siteTemplate.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:p="primefaces"
                xmlns:ui="jakarta.faces.facelets">

    <ui:define name="editableContentcontent">

        <h:form id="CatFactForm">

            <div align="center">
                <br />
                <h1>Random Cat Fact</h1>
                <br /><br />

                <!-- Show Fact -->
                <h:outputText value="#{apiController.catFact}"
                              style="font-size:20px; font-weight:bold;" />

                <br /><br /><br />

                <!-- Button -->
                <p:commandButton value="Show Random Cat Fact"
                                 icon="fas fa-comment"
                                 styleClass="rounded-button"
                                 update="CatFactForm"
                                 action="#{apiController.getRandomCatFact()}" />

            </div>

        </h:form>

    </ui:define>
</ui:composition>
